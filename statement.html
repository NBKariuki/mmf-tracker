<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MMF Member Statement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f7f5;--page:#ffffff;--t1:#111827;--t2:#6b7280;--t3:#9ca3af;--br:#e5e7eb;--br2:#d1d5db;--row0:#f9fafb;--row1:#ffffff;--cur:#ecfdf5;--foot:#f3f4f6;--th:#f3f4f6;--ac:#00a86b;--ac-d:#ecfdf5;--ac-b:#a7f3d0;--dd-bg:#f0f9ff;--dd-b:#bae6fd;}
[data-theme="dark"]{--bg:#0f1117;--page:#1a1e28;--t1:#e8eaf0;--t2:#9aa0b8;--t3:#6b7280;--br:#2d3347;--br2:#3a4060;--row0:#1e2233;--row1:#1a1e28;--cur:#0d2e1f;--foot:#222638;--th:#1f2435;--ac:#00a86b;--ac-d:#0d3326;--ac-b:#145940;--dd-bg:#0d1f2d;--dd-b:#1e3a52;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);padding:20px 12px 56px;}
.page{max-width:680px;margin:0 auto;background:var(--page);border-radius:18px;border:1px solid var(--br);overflow:hidden;}
.hdr{padding:24px 32px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:20px;}
.brand{flex:1;}
.brand-name{font-family:'Sora',sans-serif;font-size:.82rem;font-weight:800;color:var(--ac);}
.brand-sub{font-size:.6rem;color:var(--t3);margin-top:3px;letter-spacing:.07em;text-transform:uppercase;}
.hdr-div{width:1px;height:32px;background:var(--br2);flex-shrink:0;}
.stmt-r{text-align:right;}
.stmt-title{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;color:var(--t1);letter-spacing:-.02em;}
.stmt-sub{font-size:.7rem;color:var(--t2);margin-top:4px;}
.member{display:flex;align-items:center;gap:12px;margin:20px 28px;padding:14px 18px;background:var(--ac-d);border:1px solid var(--ac-b);border-radius:12px;}
.m-ico{font-size:1.8rem;line-height:1;flex-shrink:0;}
.m-name{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:800;color:var(--t1);}
.m-ref{font-size:.68rem;color:var(--t2);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.ytd{display:flex;margin:0 28px 20px;border:1px solid var(--br);border-radius:10px;overflow:hidden;}
.ytd-cell{flex:1;padding:12px 10px;text-align:center;border-right:1px solid var(--br);}
.ytd-cell:last-child{border-right:none;}
.ytd-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:4px;}
.ytd-kes{display:block;font-size:.58rem;font-weight:600;color:var(--t3);margin-bottom:1px;}
.ytd-amt{display:block;font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:700;color:var(--t1);word-break:break-all;}
.ytd-amt.g{color:var(--ac);}
.sec{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);padding:0 28px 8px;}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.sum{width:100%;border-collapse:collapse;table-layout:fixed;}
table.sum col.c-mo{width:22%;}
table.sum col.c-n{width:19.5%;}
table.sum thead th{padding:9px 12px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border-bottom:2px solid var(--br2);background:var(--th);text-align:right;white-space:nowrap;}
table.sum thead th.tl{text-align:left;padding-left:28px;}
table.sum thead th.tr{padding-right:20px;}
table.sum tbody tr.mrow{cursor:pointer;}
table.sum tbody tr.mrow:hover td{background:rgba(0,168,107,.07)!important;}
table.sum tbody tr.mrow td{padding:11px 12px;font-family:'JetBrains Mono',monospace;font-size:.8rem;text-align:right;border-bottom:1px solid var(--br);color:var(--t2);transition:background .1s;}
table.sum tbody tr.mrow td.tdl{font-family:'DM Sans',sans-serif;text-align:left;padding-left:28px;font-size:.84rem;font-weight:700;color:var(--t1);}
table.sum tbody tr.mrow td.tdr{padding-right:20px;font-weight:700;color:var(--t1);}
table.sum tbody tr.mrow.cur td{background:var(--cur);}
table.sum tbody tr.mrow.cur td.tdl,table.sum tbody tr.mrow.cur td.tdr{color:var(--ac);}
table.sum tbody tr.mrow td.g{color:var(--ac);}
table.sum tbody tr.mrow td.ev{background:var(--row0);}
.tog{display:inline-block;font-size:.55rem;color:var(--t3);margin-right:6px;transition:transform .2s;vertical-align:middle;}
.tog.open{transform:rotate(90deg);}
table.sum tbody tr.drow{display:none;}
table.sum tbody tr.drow.open{display:table-row;}
table.sum tbody tr.drow td{padding:0;border-bottom:1px solid var(--br);}
.dp{background:var(--dd-bg);border-top:1px solid var(--dd-b);}
.dp-spin{padding:14px 28px;display:flex;align-items:center;gap:8px;font-size:.76rem;color:var(--t3);}
.spin{width:13px;height:13px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
table.daily{width:100%;border-collapse:collapse;table-layout:fixed;}
table.daily col.dc-dt{width:20%;}
table.daily col.dc-nr{width:22%;}
table.daily col.dc-n{width:14.5%;}
table.daily thead th{padding:8px 10px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border-bottom:1px solid var(--dd-b);background:transparent;text-align:right;white-space:nowrap;}
table.daily thead th.tl{text-align:left;padding-left:28px;}
table.daily tbody td{padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:.74rem;text-align:right;border-bottom:1px solid var(--br);color:var(--t2);}
table.daily tbody td.tdl{font-family:'DM Sans',sans-serif;text-align:left;padding-left:28px;color:var(--t1);font-size:.76rem;}
table.daily tbody td.tdr{padding-right:20px;font-weight:600;color:var(--t1);}
table.daily tbody td.g{color:var(--ac);}
table.daily tbody tr:last-child td{border-bottom:none;}
table.daily tbody tr.alt td{background:rgba(0,0,0,.025);}
[data-theme="dark"] table.daily tbody tr.alt td{background:rgba(255,255,255,.02);}
.dp-note{font-size:.66rem;color:var(--t3);padding:8px 28px 12px;font-style:italic;}
.dp-err{padding:12px 28px;font-size:.74rem;color:var(--t3);}
table.sum tfoot tr td{padding:11px 12px;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;text-align:right;border-top:2px solid var(--br2);background:var(--foot);color:var(--t1);}
table.sum tfoot tr td.tdl{font-family:'DM Sans',sans-serif;text-align:left;padding-left:28px;font-size:.84rem;}
table.sum tfoot tr td.tdr{padding-right:20px;}
table.sum tfoot tr td.g{color:var(--ac);}
.footer{padding:18px 28px 24px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;}
.f-date{font-size:.65rem;color:var(--t3);text-align:right;}
.f-conf{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--br2);margin-top:2px;text-align:right;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px;}
.spin-lg{width:30px;height:30px;border:3px solid var(--br);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
.load-msg{font-size:.8rem;color:var(--t2);}
@media(max-width:460px){
  body{padding:0;}
  .page{border-radius:0;border-left:none;border-right:none;}
  .hdr{padding:16px 14px 14px;}
  .member{margin:14px;}
  .ytd{margin:0 0 16px;border-radius:0;border-left:none;border-right:none;}
  .sec{padding:0 14px 6px;}
  table.sum thead th.tl,table.sum tbody tr.mrow td.tdl,table.sum tfoot tr td.tdl{padding-left:14px;}
  table.daily thead th.tl,table.daily tbody td.tdl{padding-left:14px;}
  .dp-spin,.dp-note,.dp-err{padding-left:14px;}
  .footer{padding:14px 14px 24px;}
}
</style>
</head>

</div>

const CUR_YEAR=new Date().getFullYear();
const MEMBERS_URL=atob('aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvZS8yUEFDWC0xdlFmUWRCVmwwMWN4c0lvR25mSkxsdEdEdU9rSVZERnFqLXJOZzNLd0ZWWjgtR0diVXFrMURTc19DVmF5Z2lzamFMaGczMGcxZ2p6SXNkQy9wdWI/Z2lkPTE4MDc5MjY5NzMmc2luZ2xlPXRydWUmb3V0cHV0PWNzdg==');

const MONTH_URLS={};MONTHS.forEach((m,i)=>{MONTH_URLS[m]=atob(URLS[i]);});

// Distribution sheet — single fund-level CSV (Date,Narration,Inflow,Withdrawal,Net Interest,Running Balance)
const DIST_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vRa3_EHeyinakX8bnI8gNnsrOI839tYl2i2-D2lAZCvCRja02_7708k4EbNwtP85r2kVcjLxPh-nBFi/pub?output=csv';

const CITY_ICON={Tokyo:'🗼',Berlin:'🐻',Gandia:'🏖️',Denver:'🏔️',Helsinki:'🇫🇮',Oslo:'🫎',Moscow:'🏛️',California:'🌴',Lisbon:'🛸',Stockholm:'👑',Paris:'🗽',Marseille:'⚓',Rio:'🌊',Nairobi:'🦁','Tel Aviv':'✡️',Valencia:'🍊',Havana:'🎺',Manilla:'🌺',Scofield:'🔑',Bogota:'☁️',Emirates:'🌇',Dublin:'🍀',Doha:'🌙',Bern:'🐻‍❄️'};

function parseRow(line){const r=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur);cur='';}else cur+=ch;}r.push(cur);return r;}
const nv=s=>parseFloat((s||'').replace(/["',\s]/g,''))||0;
const f2=v=>(v||0).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});
const f0=v=>(v||0).toLocaleString('en-KE',{maximumFractionDigits:0});
const el=id=>document.getElementById(id);

const params=new URLSearchParams(location.search);
const alias=params.get('alias')||'';
const theme=params.get('theme')||'dark';
document.documentElement.setAttribute('data-theme',theme);
document.title=`Statement · ${alias} · ${CUR_YEAR}`;

async function fetchMonthly(){
  const curIdx=new Date().getMonth();
  const out={};
  await Promise.all(MONTHS.slice(0,curIdx+1).map(async m=>{
    try{
      const r=await fetch(MONTH_URLS[m]+'&_='+Date.now(),{cache:'no-store'});
      if(!r.ok)return;
      const lines=(await r.text()).split('\n').filter(l=>l.trim());
      for(let i=3;i<lines.length;i++){
        const c=parseRow(lines[i]);
        if(c[0]?.trim().replace(/"/g,'')=== alias){
          out[m]={openingBalance:nv(c[1]),topups:nv(c[2]),interest:nv(c[3]),
            daysActive:parseInt((c[4]||'').replace(/[",\s]/g,''))||0,closingBalance:nv(c[5])};
          break;
        }
      }
    }catch{}
  }));
  return out;
}

let _distByMonth=null,_distPromise=null;
async function fetchDist(){
  if(_distByMonth)return _distByMonth;
  if(_distPromise)return _distPromise;
  _distPromise=(async()=>{
    try{
      const r=await fetch(DIST_CSV+'&_='+Date.now(),{cache:'no-store'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const lines=(await r.text()).split('\n').filter(l=>l.trim());
      if(lines.length<2)return(_distByMonth={});
      const hdrs=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/["\s]/g,''));
      const iDt=hdrs.findIndex(h=>h.includes('date'));
      const iNr=hdrs.findIndex(h=>h.includes('narr')||h.includes('desc')||h.includes('part'));
      const iIn=hdrs.findIndex(h=>h.includes('inflow')||h==='in'||h.includes('deposit'));
      const iWd=hdrs.findIndex(h=>h.includes('withdr')||h==='out'||h.includes('debit'));
      const iNt=hdrs.findIndex(h=>h.includes('interest')||h.includes('netint'));
      const iBl=hdrs.findIndex(h=>h.includes('balance')||h.includes('running'));
      const dt=iDt>=0?iDt:0,nr=iNr>=0?iNr:1,iv=iIn>=0?iIn:2;
      const wd=iWd>=0?iWd:3,nt=iNt>=0?iNt:4,bl=iBl>=0?iBl:5;
      const byM={};
      for(let i=1;i<lines.length;i++){
        const c=parseRow(lines[i]);
        const date=c[dt]?.trim().replace(/"/g,'');
        if(!date)continue;
        const mo=MONTHS.find(m=>date.toLowerCase().includes(m.toLowerCase()));
        if(!mo)continue;
        (byM[mo]=byM[mo]||[]).push({
          date,narr:c[nr]?.trim().replace(/"/g,'')||'',
          inflow:nv(c[iv]),withdrawal:nv(c[wd]),interest:nv(c[nt]),balance:nv(c[bl])
        });
      }
      return(_distByMonth=byM);
    }catch(e){console.warn('Dist CSV failed:',e);return(_distByMonth={});}
  })();
  return _distPromise;
}

function renderSummary(monthly){
  const curIdx=new Date().getMonth(),curMonth=MONTHS[curIdx];
  let ytdTop=0,ytdInt=0,lastBal=0;
  MONTHS.slice(0,curIdx+1).forEach(m=>{const d=monthly[m];if(!d)return;ytdTop+=d.topups;ytdInt+=d.interest;lastBal=d.closingBalance;});
  el('stmt-period').textContent=`Year to Date · Jan – ${curMonth} ${CUR_YEAR}`;
  el('m-ico').textContent=CITY_ICON[alias]||'👤';
  el('m-name').textContent=alias;
  el('m-ref').textContent=`Ref 308398M · Etica MMF · ${CUR_YEAR}`;
  el('f-date').textContent=`Generated ${new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'long',year:'numeric'})}`;
  el('ytd').innerHTML=`
    <div class="ytd-cell"><div class="ytd-lbl">YTD Deposits</div><span class="ytd-kes">KES</span><span class="ytd-amt">${f0(ytdTop)}</span></div>
    <div class="ytd-cell"><div class="ytd-lbl">YTD Interest</div><span class="ytd-kes">KES</span><span class="ytd-amt g">${f2(ytdInt)}</span></div>
    <div class="ytd-cell"><div class="ytd-lbl">Current Balance</div><span class="ytd-kes">KES</span><span class="ytd-amt g">${f2(lastBal)}</span></div>`;
  const tbody=el('tbody');tbody.innerHTML='';
  MONTHS.slice(0,curIdx+1).forEach((m,idx)=>{
    const d=monthly[m]||{openingBalance:0,topups:0,interest:0,closingBalance:0};
    const cur=m===curMonth,ev=idx%2===0;
    const mrow=document.createElement('tr');
    mrow.className='mrow'+(cur?' cur':'');
    mrow.innerHTML=`
      <td class="tdl${ev&&!cur?' ev':''}"><span class="tog" id="tog-${m}">▶</span>${m}</td>
      <td class="${ev&&!cur?'ev':''}">${f2(d.openingBalance)}</td>
      <td class="${ev&&!cur?'ev':''}">${d.topups>0?f0(d.topups):'—'}</td>
      <td class="g${ev&&!cur?' ev':''}">${f2(d.interest)}</td>
      <td class="tdr${ev&&!cur?' ev':''}">${f2(d.closingBalance)}</td>`;
    mrow.addEventListener('click',()=>toggleDaily(m));
    tbody.appendChild(mrow);
    const drow=document.createElement('tr');
    drow.className='drow';drow.id='drow-'+m;
    drow.innerHTML=`<td colspan="5"><div class="dp" id="dp-${m}"></div></td>`;
    tbody.appendChild(drow);
  });
  el('tfoot').innerHTML=`<tr>
    <td class="tdl">Total ${CUR_YEAR}</td>
    <td>—</td><td>${f0(ytdTop)}</td>
    <td class="g">${f2(ytdInt)}</td>
    <td class="tdr g">${f2(lastBal)}</td></tr>`;
}

const _shown={};
async function toggleDaily(month){
  const drow=el('drow-'+month),tog=el('tog-'+month),dp=el('dp-'+month);
  if(!drow)return;
  if(drow.classList.contains('open')){drow.classList.remove('open');tog.classList.remove('open');return;}
  drow.classList.add('open');tog.classList.add('open');
  if(_shown[month])return;
  _shown[month]=true;
  dp.innerHTML=`<div class="dp-spin"><div class="spin"></div>Loading ${month} detail…</div>`;
  const byM=await fetchDist();
  const rows=(byM[month])||[];
  if(!rows.length){dp.innerHTML=`<div class="dp-err">No distribution data for ${month} yet.</div>`;return;}
  const rowsHTML=rows.map((r,i)=>`<tr class="${i%2?'alt':''}">
    <td class="tdl">${r.date}</td>
    <td class="tdl" style="padding-left:10px">${r.narr}</td>
    <td>${r.inflow>0?f2(r.inflow):'—'}</td>
    <td>${r.withdrawal>0?f2(r.withdrawal):'—'}</td>
    <td class="g">${r.interest>0?f2(r.interest):'—'}</td>
    <td class="tdr">${f2(r.balance)}</td></tr>`).join('');
  dp.innerHTML=`<div class="tscroll"><table class="daily">
    <colgroup><col class="dc-dt"><col class="dc-nr"><col class="dc-n"><col class="dc-n"><col class="dc-n"><col class="dc-n"></colgroup>
    <thead><tr>
      <th class="tl">Date</th><th class="tl" style="padding-left:10px">Narration</th>
      <th>Inflow</th><th>Withdrawal</th><th>Net Interest</th><th class="tr" style="padding-right:20px">Running Bal</th>
    </tr></thead>
    <tbody>${rowsHTML}</tbody>
  </table></div>
  <div class="dp-note">Group fund activity — Etica account · updated monthly.</div>`;
}

(async()=>{
  if(!alias){el('loading').innerHTML='<div class="load-msg" style="color:#ef4444">No alias specified. Open from the main app.</div>';return;}
  try{
    const[monthly]=await Promise.all([fetchMonthly(),fetchDist()]);
    renderSummary(monthly);
    el('loading').style.display='none';
    el('statement').style.display='block';
  }catch(e){el('loading').innerHTML=`<div class="load-msg" style="color:#ef4444">Failed to load.<br><small>${e.message}</small></div>`;}
})();
</script>
</body>
</html>
